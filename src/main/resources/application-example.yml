# 复制为 application-local.yml 或通过环境变量注入密钥（勿提交真实 Key）
#
# PowerShell 示例：
#   $env:DEEPSEEK_API_KEY="sk-..."
#   $env:ZHIPU_API_KEY="..."
#   mvn spring-boot:run

agentscope:
  chat:
    api-key: sk-your-deepseek-key
  embedding:
    api-key: your-zhipu-key

document:
  ocr:
    enabled: false   # 扫描 PDF 需 MinerU 或 Vision 模型，见 docs/DESIGN.md

ai:
  document-parse:
    mineru:
      enabled: true  # 本地 MinerU 解析扫描件时开启
